<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Suporte - Crypta Bank</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <div id="aviso">{{ aviso }}</div>

    <header>
        <h1 class="logo" data-url="{{ url_for('homepage') }}">Crypta Bank</h1>
        <a href="{{ url_for('painel') }}" class="voltar">← Voltar</a>
    </header>

    <main class="container">

        <section class="card">
            <h2>Central de Suporte</h2>

            <form action="{{ url_for('enviar_suporte') }}" method="POST">
                <label>Assunto</label>
                <input type="text" placeholder="Ex: Problema com transferência" name="titulo">

                <label>Categoria</label>
                <select name="cat">
                    <option value="duvida">Dúvida</option>
                    <option value="problema-tec">Problema técnico</option>
                    <option value="pagamento">Pagamento</option>
                    <option value="sec">Segurança</option>
                    <option value="outro">Outro</option>
                </select>

                <label>Descreva o problema</label>
                <textarea placeholder="Explique o que aconteceu..." name="problema"></textarea>

                <button type="submit" class="btn-primary">Enviar Solicitação</button>
            </form>
        </section>

        <section class="card contato">
            <h3>Outros Canais</h3>
            <p>📞 Telefone: 0800 123 4567</p>
            <p>💬 Chat 24h no aplicativo</p>
            <p>📧 Email: suporte@cryptabank.com</p>
        </section>

    </main>

    <script>
        const aviso = document.querySelector('#aviso')
        function mostrar () {
            aviso.classList.add('mostrar')

            setTimeout( () => {aviso.classList.remove('mostrar')}, 3000);
        }
        if (aviso.textContent !== 'None') {
            window.onload = () => mostrar()
        }
    </script>
    <script src="{{ url_for('static', filename='index.js') }}"></script>

</body>

</html>
