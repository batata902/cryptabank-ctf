<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Detalhes da Transferência - Crypta Bank</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <h1>Crypta Bank</h1>
    <a href="historico.html" class="voltar">← Voltar</a>
</header>

<main class="container">

    <section class="card detalhes-transferencia">

        <h2>Detalhes da Transferência</h2>

        <div class="status sucesso">
            Transferência Concluída
        </div>

        <div class="linha">
            <span class="label">Tipo:</span>
            <span class="valor-texto entrada">Entrada</span>
        </div>

        <div class="linha">
            <span class="label">Valor:</span>
            <span class="valor-destaque">+ R$ 2.000,00</span>
        </div>

        <div class="linha">
            <span class="label">Destinatário:</span>
            <span>Maria Oliveira</span>
        </div>

        <div class="linha">
            <span class="label">Banco:</span>
            <span>Banco XPTO</span>
        </div>

        <div class="linha">
            <span class="label">Chave PIX:</span>
            <span>maria@email.com</span>
        </div>

        <div class="linha">
            <span class="label">Data:</span>
            <span>01/03/2026 - 14:32</span>
        </div>

        <div class="linha">
            <span class="label">ID da Transação:</span>
            <span>#TRX-984523</span>
        </div>

        <div class="linha">
            <span class="label">Descrição:</span>
            <span>Pagamento referente a serviços</span>
        </div>

    </section>

</main>

</body>
</html>
