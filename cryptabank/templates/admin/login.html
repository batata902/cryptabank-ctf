<!DOCTYPE html>

<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #0f172a, #020617);
        display: flex;
        justify-content: center;
        align-items: center;
        color: #e2e8f0;
    }

    .login-container {
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(12px);
        padding: 40px;
        border-radius: 16px;
        width: 350px;
        box-shadow: 0 0 40px rgba(0, 102, 255, 0.25);
        border: 1px solid rgba(59, 130, 246, 0.2);
    }

    .login-container h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #3b82f6;
    }

    .input-group {
        margin-bottom: 18px;
    }

    .input-group label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        color: #94a3b8;
    }

    .input-group input {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #1e293b;
        background: #020617;
        color: #e2e8f0;
        outline: none;
        transition: 0.2s;
    }

    .input-group input:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 10px rgba(59,130,246,0.4);
    }

    .btn-login {
        width: 100%;
        padding: 12px;
        background: linear-gradient(90deg, #2563eb, #3b82f6);
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    .btn-login:hover {
        transform: scale(1.03);
        box-shadow: 0 0 15px rgba(59,130,246,0.5);
    }

    .footer {
        text-align: center;
        margin-top: 15px;
        font-size: 12px;
        color: #64748b;
    }

    .error {
        background: rgba(255,0,0,0.15);
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 15px;
        text-align: center;
        color: #f87171;
    }
</style>

</head>

<body>

<div class="login-container">
    <h2>Painel Admin</h2>

{% if error %}
    <div class="error">{{ error }}</div>
{% endif %}

<form method="POST" action="{{ url_for('admin_dologin') }}">
    <div class="input-group">
        <label>Usuário</label>
        <input type="text" name="email" required>
    </div>

    <div class="input-group">
        <label>Senha</label>
        <input type="password" name="senha" required>
    </div>

    <button class="btn-login">Entrar</button>
</form>

<div class="footer">
    CryptaBank • Admin System
</div>

</div>

</body>
</html>
