<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Configurações — Admin | Crypta Bank</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<div class="admin-layout">

    {% set active = 'config' %}
    {% include 'admin/_sidebar.html' %}

    <main class="main-content">

        <div class="topbar">
            <h1>Configurações do Sistema</h1>
            <a href="{{ url_for('homepage') }}">← Sair para o site</a>
        </div>

        <div class="page-body">
            <form class="form-config" method="POST" action="#">

                <div class="card">
                    <div class="card-header"><h2>⚙ Configurações Gerais</h2></div>
                    <label>Nome do Sistema</label>
                    <input type="text" value="Crypta Bank">
                    <label>Email de Suporte</label>
                    <input type="email" value="suporte@cryptabank.com">
                    <label>Modo Manutenção</label>
                    <select>
                        <option value="nao">Desativado</option>
                        <option value="sim">Ativado</option>
                    </select>
                </div>

                <div class="card">
                    <div class="card-header"><h2>💰 Taxas e Tarifas</h2></div>
                    <label>Taxa de Transferência (%)</label>
                    <input type="number" step="0.01" value="1.50">
                </div>

                <div class="card">
                    <div class="card-header"><h2>🏦 Limites de Transação</h2></div>
                    <label>Limite máximo por transação (R$)</label>
                    <input type="number" value="10000">
                </div>

                <div class="card">
                    <div class="card-header"><h2>📧 Configuração de Email SMTP</h2></div>
                    <label>Servidor SMTP</label>
                    <input type="text" placeholder="smtp.exemplo.com">
                    <label>Porta</label>
                    <input type="number" value="587">
                    <label>Usuário SMTP</label>
                    <input type="text">
                    <label>Senha SMTP</label>
                    <input type="password">
                </div>

                <div>
                    <button type="submit" class="btn btn-primary btn-salvar">💾 Salvar Configurações</button>
                </div>

            </form>
        </div>
    </main>
</div>

</body>
</html>
