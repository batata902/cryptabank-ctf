<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Configurações - Admin | Crypta Bank</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<div class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>Admin</h2>
        <nav>
            <a href="{{ url_for('admin') }}">📊 Dashboard</a>
            <a href="#">👥 Usuários</a>
            <a href="{{ url_for('admin_transf') }}">💸 Transferências</a>
            <a href="{{ url_for('suporte') }}">🎧 Suporte</a>
            <a href="#">🏦 Carteiras</a>
            <a href="{{ url_for('admin_config') }}">⚙ Configurações</a>
        </nav>
    </aside>

    <!-- CONTEÚDO -->
    <main class="main-content">

        <header class="topbar">
            <h1>Configurações do Sistema</h1>
            <a href="index.html">Sair</a>
        </header>

        <form class="form-config">

            <!-- CONFIGURAÇÕES GERAIS -->
            <section class="card">
                <h3>⚙ Configurações Gerais</h3>

                <label>Nome do Sistema</label>
                <input type="text" value="Crypta Bank">

                <label>Email de Suporte</label>
                <input type="email" value="suporte@cryptabank.com">

                <label>Modo Manutenção</label>
                <select>
                    <option value="nao">Desativado</option>
                    <option value="sim">Ativado</option>
                </select>
            </section>

            <!-- TAXAS -->
            <section class="card">
                <h3>💰 Taxas e Tarifas</h3>

                <label>Taxa PIX (%)</label>
                <input type="number" step="0.01" value="0.00">

                <label>Taxa TED (%)</label>
                <input type="number" step="0.01" value="1.50">

                <label>Taxa Saque (R$)</label>
                <input type="number" step="0.01" value="6.50">
            </section>

            <!-- LIMITES -->
            <section class="card">
                <h3>🏦 Limites de Transação</h3>

                <label>Limite diário PIX (R$)</label>
                <input type="number" value="5000">

                <label>Limite mensal transferência (R$)</label>
                <input type="number" value="50000">

                <label>Limite máximo por transação (R$)</label>
                <input type="number" value="10000">
            </section>

            <!-- SEGURANÇA -->
            <section class="card">
                <h3>🔐 Segurança</h3>

                <label>Tempo de sessão (minutos)</label>
                <input type="number" value="30">

                <label>Ativar autenticação 2FA obrigatória</label>
                <select>
                    <option value="nao">Não</option>
                    <option value="sim">Sim</option>
                </select>

                <label>Bloqueio após tentativas de login</label>
                <input type="number" value="5">
            </section>

            <!-- EMAIL -->
            <section class="card">
                <h3>📧 Configuração de Email SMTP</h3>

                <label>Servidor SMTP</label>
                <input type="text" placeholder="smtp.exemplo.com">

                <label>Porta</label>
                <input type="number" value="587">

                <label>Usuário SMTP</label>
                <input type="text">

                <label>Senha SMTP</label>
                <input type="password">
            </section>

            <button type="submit" class="btn-salvar">Salvar Configurações</button>

        </form>

    </main>

</div>

</body>
</html>
